<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Katakana Converter</title>
  <meta name="description" content="Get in touch with the Katakana Converter team. Send us feedback, report issues, or suggest improvements for our English to Katakana conversion tool.">
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <link rel="canonical" href="https://katakana-converter.com/contact-us/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%236366f1'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>カ</text></svg>" type="image/svg+xml">
  <meta property="og:title" content="Contact Us — Katakana Converter">
  <meta property="og:description" content="Send us feedback or suggestions about Katakana Converter.">
  <meta property="og:url" content="https://katakana-converter.com/contact-us/">
  <meta property="og:site_name" content="Katakana Converter">
  <meta property="og:locale" content="en_US">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact Us — Katakana Converter">
  <meta name="twitter:description" content="Send us feedback or suggestions about Katakana Converter.">
  <link rel="stylesheet" href="../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"ContactPage","name":"Contact Katakana Converter","url":"https://katakana-converter.com/contact-us/","description":"Get in touch with the Katakana Converter team."}
  </script>
</head>
<body>
  <header class="site-header" role="banner"></header>
  <main id="main-content" role="main">
    <section class="page-hero" aria-labelledby="contact-title">
      <div class="container">
        <h1 id="contact-title">Contact Us</h1>
        <p>Have feedback, questions, or suggestions? We would love to hear from you.</p>
      </div>
    </section>
    <section class="content-section">
      <div class="container">
        <div class="content-card glass-card" style="max-width:640px;">
          <form class="contact-form" id="contact-form" novalidate>
            <div class="form-group">
              <label for="contact-name">Your Name</label>
              <input type="text" id="contact-name" name="name" class="form-input" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
              <label for="contact-email">Email Address</label>
              <input type="email" id="contact-email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label for="contact-message">Message</label>
              <textarea id="contact-message" name="message" class="form-textarea" placeholder="Tell us what's on your mind..." required></textarea>
            </div>
            <div id="form-status" class="form-status" aria-live="polite"></div>
            <button type="submit" class="btn-primary" id="contact-submit">Send Message</button>
          </form>
          <div class="email-fallback">
            Or email us directly at <a href="mailto:contact@katakana-converter.com">contact@katakana-converter.com</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer class="site-footer" role="contentinfo"></footer>
  <script src="../js/layout.js"></script>
  <script>
    SiteLayout.init('/contact-us/');
    document.addEventListener('DOMContentLoaded', function() {
      var form = document.getElementById('contact-form');
      var status = document.getElementById('form-status');
      var submitBtn = document.getElementById('contact-submit');
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var name = document.getElementById('contact-name').value.trim();
        var email = document.getElementById('contact-email').value.trim();
        var message = document.getElementById('contact-message').value.trim();
        if (!name || !email || !message) {
          status.className = 'form-status error';
          status.textContent = 'Please fill in all fields.';
          return;
        }
        status.className = 'form-status sending';
        status.textContent = 'Sending your message...';
        submitBtn.disabled = true;
        // Simulate async submission (no real backend)
        setTimeout(function() {
          status.className = 'form-status success';
          status.textContent = 'Thank you! Your message has been sent successfully. We will get back to you soon.';
          form.reset();
          submitBtn.disabled = false;
        }, 1500);
      });
    });
  </script>
</body>
</html>
